version: "3.9"

name: tunisian-legal-assistant

networks:
  legal-net:
    name: legal-net
    driver: bridge

volumes:
  qdrant_storage:
    name: tunisian-legal-assistant_qdrant_storage
  postgres_data:
    name: tunisian-legal-assistant_postgres_data

services:

  # ---------------------------------------------------------------------
  # Vector store
  # ---------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:latest
    container_name: legal-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage:Z
    networks:
      - legal-net
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ---------------------------------------------------------------------
  # Relational store: users, sessions, chat/conversation history
  # ---------------------------------------------------------------------
  postgres:
    image: postgres:16
    container_name: legal-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data:Z
    networks:
      - legal-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------
  # Ingestion service: PDF loading / chunking / embedding into Qdrant
  # ---------------------------------------------------------------------
  ingestion-service:
    build:
      context: ./services/ingestion-service
      dockerfile: Dockerfile
    container_name: legal-ingestion-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      EMBEDDING_MODEL_NAME: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
    ports:
      - "8001:8001"
    volumes:
      - ./data/pdfs:/app/data/pdfs:Z
    networks:
      - legal-net
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # ---------------------------------------------------------------------
  # RAG service: retrieval + generation over Qdrant
  # ---------------------------------------------------------------------
  rag-service:
    build:
      context: ./services/rag-service
      dockerfile: Dockerfile
    container_name: legal-rag-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      EMBEDDING_MODEL_NAME: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
    ports:
      - "8002:8002"
    healthcheck:
      disable: true
    networks:
      - legal-net
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # ---------------------------------------------------------------------
  # API gateway: JWT auth, session management, proxies RAG requests
  # with conversation history pulled from Postgres
  # ---------------------------------------------------------------------
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: legal-api-gateway
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      EMBEDDING_MODEL_NAME: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
      RAG_SERVICE_URL: http://rag-service:8002/rag
      INGESTION_SERVICE_URL: http://ingestion-service:8001
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-60}
    ports:
      - "8000:8000"
    networks:
      - legal-net
    depends_on:
      postgres:
        condition: service_healthy
      rag-service:
        condition: service_started

  # ---------------------------------------------------------------------
  # Frontend: Next.js UI
  # ---------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: legal-frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    networks:
      - legal-net
    depends_on:
      api-gateway:
        condition: service_started

  # ---------------------------------------------------------------------
  # Reverse proxy / entry point
  # ---------------------------------------------------------------------
  nginx:
    image: nginx:latest
    container_name: legal-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:Z
    networks:
      - legal-net
    depends_on:
      api-gateway:
        condition: service_started
      frontend:
        condition: service_started
